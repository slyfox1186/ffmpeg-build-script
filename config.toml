# Copy this file and pass it with:
# bash build-ffmpeg.sh --build --config ./example.toml
#
# Supported TOML shape:
#   [build]
#   [packages]
#   key = true|false
#
# CLI flags still override config values.
# If you change package selections on an existing workspace, run:
#   bash build-ffmpeg.sh --cleanup

